name: Build

# What this covers, and why it's scoped the way it is:
#
# - `build-core` builds OWCE/OWCE/OWCE.csproj, the shared netstandard2.1 library that
#   holds almost all of the app's logic (BLE protocol, board state, converters, pages).
#   It's a plain SDK-style project, so it builds on any OS with just the .NET SDK - no
#   Xamarin toolchain needed. This is the fastest, most reliable check and will catch
#   the majority of compile errors in the codebase.
#
# - `build-android` builds OWCE/OWCE.Android/OWCE.Android.csproj with MSBuild on the
#   windows-2022 runner image (Visual Studio 2022), which ships the classic Xamarin
#   component preinstalled, so no extra Xamarin/Android SDK installation step is
#   required. This is pinned deliberately rather than using windows-latest: as of June
#   2026 windows-latest moved to a Visual Studio 2026-based image that dropped the
#   classic Xamarin component entirely (it's only relevant to VS2022-era tooling like
#   this project's non-SDK-style Xamarin.Android/.iOS projects). windows-2022 is
#   GitHub's officially supported/recommended runner for exactly this situation and is
#   expected to remain available for the next few years, but since it's a fixed image
#   rather than a rolling "latest" alias, it will eventually need to be re-evaluated
#   once it's retired for good.
#
# - There is intentionally no iOS/macOS/WatchOS build job. Those projects use classic
#   Xamarin.iOS/Xamarin.Mac, which requires a Mac. GitHub's macOS runner images no
#   longer ship the classic Xamarin.iOS/Xamarin.Mac SDKs (Xamarin.Forms went
#   out-of-support in May 2024), so a job here would just fail on missing tooling
#   rather than catch real bugs. Building those targets still requires a Mac with the
#   legacy Xamarin SDK installed by hand (eg Visual Studio for Mac, or a self-hosted
#   runner set up the same way), as described in the main README.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel a still-running CI run for the same branch/PR once a newer commit is
# pushed - otherwise every push queues a full extra run that gets superseded
# anyway, wasting CI minutes and leaving stale results around.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-core:
    name: Build core library
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-core-${{ hashFiles('OWCE/OWCE/OWCE.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-core-

      - name: Restore
        run: dotnet restore OWCE/OWCE/OWCE.csproj

      - name: Build
        run: dotnet build OWCE/OWCE/OWCE.csproj --configuration Release --no-restore

      # Report-only for now: this is a pre-existing codebase, not one that's
      # already .editorconfig-clean, so this isn't wired up to fail the build
      # yet. Once a `dotnet format` pass (see the manually-triggered "Format
      # Code" workflow) has been run and merged, drop `continue-on-error` here
      # to make style drift an actual CI failure going forward.
      - name: Check code formatting
        continue-on-error: true
        run: dotnet format OWCE/OWCE/OWCE.csproj --verify-no-changes --severity info

  build-android:
    name: Build Android app
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      # windows-2022's preinstalled JDK isn't new enough for Xamarin.Android's
      # TargetFrameworkVersion v13.0 (Android 13), which requires JDK 11+
      # (error XA0031 otherwise). Microsoft Build of OpenJDK is what Xamarin.Android's
      # own error message points to.
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: '11'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-android-${{ hashFiles('OWCE/OWCE.Android/OWCE.Android.csproj', 'OWCE/OWCE/OWCE.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-android-

      # Restore + build only the Android project (and its OWCE.csproj project
      # reference) rather than the whole .sln, so this job doesn't get tangled up in
      # the iOS/macOS/WatchOS projects it isn't meant to touch.
      #
      # Restore and Build are deliberately separate msbuild invocations, not a single
      # `/t:Restore,Build`. This is a classic (non-SDK-style) Xamarin.Android project,
      # and with those, combining both targets in one invocation doesn't reliably let
      # MSBuild pick up newly-restored referenced libraries' Android resources (eg
      # AndroidX AppCompat, pulled in transitively by Xamarin.Forms) before the aapt2
      # resource-linking step runs, causing "resource ... not found" errors even though
      # the resource is very much present in the graph. Restoring first as its own step
      # avoids that.
      - name: Restore
        run: msbuild OWCE/OWCE.Android/OWCE.Android.csproj /t:Restore /p:Configuration=Debug /p:Platform=AnyCPU /v:minimal

      - name: Build
        run: msbuild OWCE/OWCE.Android/OWCE.Android.csproj /t:Build /p:Configuration=Debug /p:Platform=AnyCPU /p:JavaSdkDirectory="${{ env.JAVA_HOME }}" /m /v:minimal
