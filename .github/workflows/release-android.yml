name: Release Android APK

# Builds a signed, sideload-ready release APK and attaches it to a GitHub Release.
# Does NOT publish to Google Play - this is for manual distribution only.
#
# Setup required before this will work (one-time):
#   1. Generate a signing keystore (or use an existing one).
#   2. Add these as repository secrets (Settings -> Secrets and variables -> Actions):
#        ANDROID_KEYSTORE_BASE64   - base64-encoded contents of the .keystore file
#        ANDROID_KEYSTORE_PASSWORD - keystore password
#        ANDROID_KEY_ALIAS         - key alias inside the keystore
#        ANDROID_KEY_PASSWORD      - key password (same as store password for
#                                     PKCS12-format keystores, which is what modern
#                                     `keytool` produces by default)
#
# To cut a release, either:
#   - git tag v1.2.3 && git push origin v1.2.3, or
#   - GitHub web UI: Releases -> "Draft a new release" -> type a new tag (eg
#     v1.2.3) under "Choose a tag" -> Publish release. This creates the tag and a
#     release in one step; the job below detects the pre-existing release and
#     uploads the APK to it instead of trying to create a duplicate.
#
# Runner/toolchain choices here mirror build.yml - see that file's comments for why
# windows-2022 (not windows-latest) and a manually-installed JDK 11 are required, and
# why Restore and Build run as separate msbuild invocations.
#
# See VERSIONING.md for how to choose the version number itself (SemVer, what
# the -test suffix means, when to drop it, when to tag 1.0.0).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release - SemVer, no leading v (eg 1.2.3 or 1.2.3-test; creates tag v1.2.3). See VERSIONING.md.'
        required: true

permissions:
  contents: write

jobs:
  release-android:
    name: Build, sign, and release Android APK
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Check signing secrets are configured
        shell: bash
        run: |
          missing=()
          [[ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]] && missing+=("ANDROID_KEYSTORE_BASE64")
          [[ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]] && missing+=("ANDROID_KEYSTORE_PASSWORD")
          [[ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]] && missing+=("ANDROID_KEY_ALIAS")
          [[ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]] && missing+=("ANDROID_KEY_PASSWORD")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required repository secrets: ${missing[*]}"
            echo "Add these under Settings -> Secrets and variables -> Actions before running this workflow."
            exit 1
          fi

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION_NAME="${{ inputs.version }}"

            # The most common mistake here: typing "v1.2.3" (with the leading v)
            # into the workflow_dispatch input produces the tag "vv1.2.3", since
            # the "v" prefix below is always added on top. This has actually
            # happened in this repo's own tag history (vv0.0.2-test..vv0.0.5-test).
            # Fail fast instead of quietly creating another malformed tag/release.
            if [[ "$VERSION_NAME" == v* ]]; then
              echo "::error::Version input '$VERSION_NAME' starts with 'v' - enter just the version number (eg '1.2.3'), not the tag name. This workflow adds the 'v' prefix itself; including it here produces a broken 'vv1.2.3' tag."
              exit 1
            fi

            TAG_NAME="v${VERSION_NAME}"
          else
            TAG_NAME="${{ github.ref_name }}"
            VERSION_NAME="${TAG_NAME#v}"
          fi

          # Enforce SemVer 2.0.0 (see VERSIONING.md): MAJOR.MINOR.PATCH with an
          # optional -prerelease suffix (eg "1.2.3" or "1.2.3-test"/"1.2.3-rc.1").
          # Catches typos (missing a segment, stray characters) before they reach
          # a signed build, a git tag, or a published GitHub Release.
          SEMVER_PATTERN='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if ! [[ "$VERSION_NAME" =~ $SEMVER_PATTERN ]]; then
            echo "::error::Version '$VERSION_NAME' isn't valid SemVer (MAJOR.MINOR.PATCH, eg '1.2.3' or '1.2.3-test'). See VERSIONING.md."
            exit 1
          fi

          # Android requires a strictly increasing integer versionCode between
          # releases for updates to install cleanly over an existing sideload -
          # the workflow run number is a simple, always-increasing source for that.
          VERSION_CODE="${{ github.run_number }}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION_NAME (versionCode $VERSION_CODE) as tag $TAG_NAME"

      - name: Set version in AndroidManifest.xml
        shell: bash
        run: |
          MANIFEST=OWCE/OWCE.Android/Properties/AndroidManifest.xml
          sed -i "s/android:versionCode=\"[0-9]*\"/android:versionCode=\"${{ steps.version.outputs.version_code }}\"/" "$MANIFEST"
          sed -i "s/android:versionName=\"[^\"]*\"/android:versionName=\"${{ steps.version.outputs.version_name }}\"/" "$MANIFEST"
          grep versionCode "$MANIFEST"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: '11'

      # Deliberately the same key build.yml's Android job uses (no "-release"
      # suffix), not a separate namespace. NuGet restore resolves the same
      # packages regardless of Debug vs Release configuration, and build.yml
      # runs (and refreshes this exact cache) on every push to main, while
      # this workflow only runs when cutting a release - so a separate
      # "-release" cache was consistently stale (a restore-keys fallback
      # match, not an exact hit) by the time any release actually happened,
      # since the source commit had already moved past its last snapshot.
      # Sharing the key lets releases ride on the cache CI already keeps warm.
      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-android-${{ hashFiles('OWCE/OWCE.Android/OWCE.Android.csproj', 'OWCE/OWCE/OWCE.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-android-

      - name: Restore
        run: msbuild OWCE/OWCE.Android/OWCE.Android.csproj /t:Restore /p:Configuration=Release /p:Platform=AnyCPU /v:minimal

      - name: Decode signing keystore
        shell: bash
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/owce-release.keystore"

      - name: Build and sign release APK
        shell: pwsh
        run: |
          msbuild OWCE/OWCE.Android/OWCE.Android.csproj `
            /t:SignAndroidPackage `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:JavaSdkDirectory="${{ env.JAVA_HOME }}" `
            /p:AndroidKeyStore=true `
            /p:AndroidSigningKeyStore="${{ runner.temp }}\owce-release.keystore" `
            /p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" `
            /p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" `
            /p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASSWORD }}" `
            /m /v:minimal

      - name: Remove keystore from disk
        if: always()
        shell: bash
        run: rm -f "${{ runner.temp }}/owce-release.keystore"

      - name: Locate signed APK
        id: apk
        shell: bash
        run: |
          APK=$(find OWCE/OWCE.Android/bin/Release -iname "*-Signed.apk" | head -n1)
          if [[ -z "$APK" ]]; then
            APK=$(find OWCE/OWCE.Android/bin/Release -iname "*.apk" | head -n1)
          fi
          if [[ -z "$APK" ]]; then
            echo "::error::No .apk found under OWCE/OWCE.Android/bin/Release"
            exit 1
          fi
          echo "Found APK: $APK"
          NEWNAME="OWCE-${{ steps.version.outputs.version_name }}.apk"
          cp "$APK" "$NEWNAME"
          echo "apk_path=$NEWNAME" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag_name }}"
          APK="${{ steps.apk.outputs.apk_path }}"
          # The tag (and sometimes a release for it) may already exist - eg if it was
          # created via the GitHub web UI's "Draft a new release" page, which creates
          # the tag and the release together, rather than via `git push` (tag only).
          # Upload to that release instead of trying to create a duplicate in that case.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists - uploading APK to it."
            gh release upload "$TAG" "$APK" --clobber
          else
            gh release create "$TAG" "$APK" \
              --title "OWCE ${{ steps.version.outputs.version_name }}" \
              --generate-notes \
              --target "${{ github.sha }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
